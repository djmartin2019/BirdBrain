experiment_name: bird_classifier_resnet50_stage2
run_name: resnet50-stage2-last-block
phase: "2"

model:
  name: resnet50
  num_classes: 200
  pretrained: true
  checkpoint_path: models/birdbrain_resnet50_v1.pt
  output_path: models/birdbrain_resnet50_v1-1.pt

training:
  epochs: 10
  batch_size: 32
  optimizer: adamw
  learning_rate: 0.001
  backbone_learning_rate: null
  weight_decay: 0.0
  label_smoothing: 0.0
  freeze_backbone: true
  unfreeze_blocks: 1
  scheduler:
    patience: 2
    factor: 0.5
  early_stopping_patience: null

data:
  data_dir: data/raw/CUB_200_2011
  image_size: 224
  use_bbox_crop: false
  augmentation: minimal
  num_workers: 4
  val_split_file: splits/val_split.txt

mlflow:
  experiment: birdbrain-cub200

recorded:
  notes: "Unfroze ResNet layer4; loaded birdbrain_resnet50_v1.pt at lr 1e-3"
