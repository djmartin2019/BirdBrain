experiment_name: bird_classifier_efficientnet_stage1
run_name: efficientnet-stage1-head
phase: "1"

model:
  name: efficientnet_b0
  num_classes: 200
  pretrained: true
  checkpoint_path: null
  output_path: models/birdbrain_v1.pt

training:
  epochs: 10
  batch_size: 32
  optimizer: adam
  learning_rate: 0.001
  backbone_learning_rate: null
  weight_decay: 0.0
  label_smoothing: 0.0
  freeze_backbone: true
  unfreeze_blocks: 0
  scheduler:
    patience: 2
    factor: 0.5
  early_stopping_patience: null

data:
  data_dir: data/raw/CUB_200_2011
  image_size: 224
  use_bbox_crop: false
  augmentation: minimal
  num_workers: 4

mlflow:
  experiment: birdbrain-cub200

recorded:
  best_val_acc: 0.5198
  train_acc: 0.6823
  notes: "Head-only baseline; frozen EfficientNet backbone, classifier trained at lr 1e-3"
