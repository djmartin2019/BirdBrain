experiment_name: bird_classifier_efficientnet_stage2
run_name: efficientnet-stage2-last-block
phase: "2"

model:
  name: efficientnet_b0
  num_classes: 200
  pretrained: true
  checkpoint_path: models/birdbrain_v1.pt
  output_path: models/birdbrain_v1-1.pt

training:
  epochs: 10
  batch_size: 32
  optimizer: adam
  learning_rate: 0.001
