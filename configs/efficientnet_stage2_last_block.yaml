  early_stopping_patience: null

data:
  data_dir: data/raw/CUB_200_2011
  image_size: 224
  use_bbox_crop: false
  augmentation: minimal
  num_workers: 4

mlflow:
  experiment: birdbrain-cub200

recorded:
  best_val_acc: 0.5419
  train_acc: 0.7150
  notes: "Unfroze last EfficientNet block; loaded birdbrain_v1.pt at lr 1e-3"
