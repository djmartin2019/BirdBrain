experiment_name: bird_classifier_efficientnet_inat_stage4
run_name: efficientnet-inat-stage4-finetune
phase: "4"

model:
  name: efficientnet_b0
  num_classes: 1486
  pretrained: false
  checkpoint_path: models/birdbrain_inat_v1-2.pt
  output_path: models/birdbrain_inat_v1-3.pt

training:
  epochs: 15
  batch_size: 16
  optimizer: adam
  learning_rate: 0.0001
  backbone_learning_rate: 0.00005
  weight_decay: 0.0001
  label_smoothing: 0.1
  freeze_backbone: true
  unfreeze_blocks: 5
  scheduler:
    patience: 2
    factor: 0.5
  early_stopping_patience: 5

data:
  dataset: inat2021
  data_dir: data/raw/iNat_2021
  val_split_file: splits/inat_val_split.txt
  image_size: 224
  use_bbox_crop: false
  augmentation: strong
  num_workers: 4

mlflow:
  experiment: birdbrain-inat-birds
