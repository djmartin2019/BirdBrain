experiment_name: bird_classifier_efficientnet_stage4
run_name: efficientnet-stage4-finetune
phase: "4"

model:
  name: efficientnet_b0
  num_classes: 200
  pretrained: true
  checkpoint_path: models/birdbrain_v1-2.pt
  output_path: models/birdbrain_v1-3.pt

training:
  epochs: 15
  batch_size: 32
  optimizer: adam
  learning_rate: 0.0005
  backbone_learning_rate: 0.0001
  weight_decay: 0.0001
  label_smoothing: 0.0
  freeze_backbone: true
  unfreeze_blocks: 3
  scheduler:
    patience: 2
    factor: 0.5
  early_stopping_patience: null

data:
  data_dir: data/raw/CUB_200_2011
  image_size: 224
  use_bbox_crop: false
  augmentation: standard
  num_workers: 4

mlflow:
  experiment: birdbrain-cub200

recorded:
  notes: "Continued fine-tune from stage 3; same hyperparameters, new checkpoint chain"
