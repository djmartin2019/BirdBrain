experiment_name: bird_classifier_resnet50_stage5
run_name: resnet50-stage5-bbox-crop
phase: "5"

model:
  name: resnet50
  num_classes: 200
  pretrained: true
  checkpoint_path: models/birdbrain_resnet50_v1-3.pt
  output_path: models/birdbrain_resnet50_v1-4.pt

training:
  epochs: 20
  batch_size: 32
  optimizer: adamw
  learning_rate: 0.0001
  backbone_learning_rate: 0.00005
  weight_decay: 0.0001
  label_smoothing: 0.1
  freeze_backbone: true
  unfreeze_blocks: 4
  scheduler:
    patience: 2
    factor: 0.5
  early_stopping_patience: 5

data:
  data_dir: data/raw/CUB_200_2011
  image_size: 224
  use_bbox_crop: true
  augmentation: strong
  num_workers: 4
  val_split_file: splits/val_split.txt

mlflow:
  experiment: birdbrain-cub200

recorded:
  notes: "Bounding box crop + all ResNet layers unfrozen; strong augmentation; label smoothing 0.1"
