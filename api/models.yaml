models:
  - id: birdbrain_voyager
    name: BirdBrain Voyager
    checkpoint: prod-models/birdbrain_inat_v1-3.pt
    labels: api/inat_labels.json
    description: Global bird specialist — 1,535 combined species
    default: true

  - id: efficientnet_b0
    name: EfficientNet-B0
    checkpoint: prod-models/birdbrain_v1-4.pt
